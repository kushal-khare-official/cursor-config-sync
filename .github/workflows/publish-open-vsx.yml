# Publishes the extension to https://open-vsx.org when a semver version tag is pushed
# (e.g. tag v0.1.2 must match the version field in package.json).
#
# Required repository secret: OPEN_VSX_PAT — create a personal access token at
# https://open-vsx.org/user-settings/tokens and add it under Settings → Secrets → Actions.

name: Publish to Open VSX

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VER="${GITHUB_REF#refs/tags/v}"
          PKG_VER="$(node -p "require('./package.json').version")"
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Git tag v$TAG_VER does not match package.json version $PKG_VER"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Package VSIX
        run: npm run package

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::OPEN_VSX_PAT secret is not set (repository Settings → Secrets and variables → Actions)"
            exit 1
          fi
          VSIX="cursor-config-sync-$(node -p "require('./package.json').version").vsix"
          npx ovsx publish -p "$OVSX_PAT" "$VSIX"
